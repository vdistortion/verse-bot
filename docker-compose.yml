name: imp-bot-dev

services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    ports:
      - '5432:5432'
    volumes:
      - ./data/dev_db:/var/lib/postgresql/data
      - ./packages/create-verse-bot/template/schema.sql:/docker-entrypoint-initdb.d/01-common.sql
      - ./apps/imp-bot/schema.imp.sql:/docker-entrypoint-initdb.d/02-imp.sql
