name: imp-bot-dev

services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file: ../../.env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

volumes:
  postgres_data:
