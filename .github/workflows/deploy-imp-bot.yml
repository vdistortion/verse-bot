name: Deploy Imp Bot

on:
  push:
    branches: [release]
    paths:
      - 'apps/imp-bot/**'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PROJECT_PATH=~/projects/${{ github.event.repository.name }}
            if [ ! -d "$PROJECT_PATH" ]; then
              mkdir -p ~/projects
              git clone git@github.com:${{ github.repository }}.git "$PROJECT_PATH"
            fi
            cd "$PROJECT_PATH"
            git pull origin release

            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            echo "TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}" >> .env
            echo "TELEGRAM_ADMIN_ID=${{ secrets.TELEGRAM_ADMIN_ID }}" >> .env
            echo "VK_GROUP_TOKEN=${{ secrets.VK_GROUP_TOKEN }}" >> .env
            echo "VK_GROUP_ID=${{ secrets.VK_GROUP_ID }}" >> .env
            echo "VK_ADMIN_ID=${{ secrets.VK_ADMIN_ID }}" >> .env
            echo "POSTGRES_DB=postgres" >> .env
            echo "POSTGRES_USER=postgres" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_HOST=db" >> .env
            echo "STATIC_DOMAIN=${{ secrets.STATIC_DOMAIN }}" >> .env
            echo "STATIC_PATH_PREFIX=${{ secrets.STATIC_PATH_PREFIX }}" >> .env
            echo "PUBLIC_URL=https://${{ secrets.STATIC_DOMAIN }}/${{ secrets.STATIC_PATH_PREFIX }}" >> .env
            echo "CONTENT_DIR=${{ secrets.CONTENT_DIR }}" >> .env

            export STATIC_DOMAIN="${{ secrets.STATIC_DOMAIN }}"
            export STATIC_PATH_PREFIX="${{ secrets.STATIC_PATH_PREFIX }}"
            export CONTENT_DIR="${{ secrets.CONTENT_DIR }}"

            docker compose -f apps/imp-bot/docker-compose.release.yml up -d --build
