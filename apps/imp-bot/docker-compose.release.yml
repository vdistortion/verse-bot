name: imp-bot-release

services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    volumes:
      - ./data/release_db:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  static:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ${CONTENT_DIR}:/usr/share/nginx/html:ro
    networks:
      - caddy
    labels:
      caddy: ${STATIC_DOMAIN}
      caddy.handle_path: /${STATIC_PATH_PREFIX}/*
      caddy.handle_path.reverse_proxy: "{{upstreams 80}}"

networks:
  caddy:
    external: true
